openapi: 3.0.3
info:
  title: Sutana Enterprise Management System API
  description: |
    Complete REST API for Sutana EMS - Printing Management, POS, Inventory, Purchase, Finance, and Reporting.
    
    ## Features
    - 🔐 JWT Authentication with Refresh Tokens
    - 👥 Role-Based Access Control (8 Roles)
    - 📊 Real-time CEO Dashboard
    - 🖨️ Printing Order Management with Tax Receipts
    - 💳 POS with Multi-payment Methods
    - 📦 Inventory Tracking with Expiry Alerts
    - 📑 Purchase Order Approval Workflow
    - 📈 Comprehensive Reporting (PDF/Excel/CSV)
    - 🔔 Email & SMS Notifications
    - 🌍 Ethiopian Banks Integration (CBE, Dashen, Awash, Telebirr)
    
  version: 1.0.0
  contact:
    name: Sutana Support
    email: support@sutana.com
    url: https://sutana.com
  license:
    name: Proprietary
    url: https://sutana.com/license

servers:
  - url: https://api.sutana.com/api/v1
    description: Production Server
  - url: https://staging-api.sutana.com/api/v1
    description: Staging Server
  - url: http://localhost:5000/api/v1
    description: Development Server

tags:
  - name: Authentication
    description: Login, logout, password management
  - name: Users
    description: User management (Admin only)
  - name: Printing
    description: Printing order management
  - name: POS
    description: Point of Sale operations
  - name: Inventory
    description: Product and stock management
  - name: Purchase
    description: Supplier and PO management
  - name: Finance
    description: Expenses and payments
  - name: Reports
    description: Financial and operational reports
  - name: CEO Dashboard
    description: Executive metrics and KPIs
  - name: Admin
    description: System administration
  - name: Customer Portal
    description: Self-service customer features
  - name: External
    description: Third-party integrations

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter JWT token from login response

  schemas:
    # =====================================================
    # COMMON SCHEMAS
    # =====================================================
    Error:
      type: object
      properties:
        status:
          type: string
          enum: [error, fail]
        message:
          type: string
        code:
          type: integer
      example:
        status: error
        message: Invalid credentials
        code: 401

    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: object

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 25
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 4

    # =====================================================
    # AUTH SCHEMAS
    # =====================================================
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Email or phone number
          example: admin@sutana.com
        password:
          type: string
          format: password
          example: Admin@123

    LoginResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT access token
            refreshToken:
              type: string
            user:
              $ref: '#/components/schemas/User'
            permissions:
              type: array
              items:
                type: string

    User:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        department:
          type: string
          enum: [Admin, CEO, Finance, Printing, Purchase, Sales, Inventory]
        status:
          type: string
          enum: [active, inactive, suspended]
        roles:
          type: array
          items:
            type: string
        lastLogin:
          type: string
          format: date-time

    # =====================================================
    # PRINTING ORDER SCHEMAS
    # =====================================================
    CreatePrintingOrderRequest:
      type: object
      required:
        - customerId
        - productType
        - quantity
        - paperType
        - pagesPerCopy
        - dueDate
      properties:
        customerId:
          type: integer
          description: Existing customer ID or new customer object
        customer:
          type: object
          description: New customer (if customerId not provided)
          properties:
            name:
              type: string
            phone:
              type: string
            customerType:
              type: string
              enum: [Government, Scholar, Lecturer, Church, Regular]
        productType:
          type: string
          enum: [Book, Module, Exam, Brochure, TaxReceipt]
        quantity:
          type: integer
          minimum: 1
        paperType:
          type: string
          enum: [A3, A4, A5]
        pagesPerCopy:
          type: integer
          minimum: 1
        colorPrinting:
          type: boolean
          default: false
        bindingType:
          type: string
          enum: [None, Spiral, Thermal]
          default: None
        dueDate:
          type: string
          format: date
        specialInstructions:
          type: string
          maxLength: 500

    PrintingOrderResponse:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
          example: PRT-20260430-0001
        customer:
          $ref: '#/components/schemas/Customer'
        productType:
          type: string
        quantity:
          type: integer
        paperType:
          type: string
        pagesPerCopy:
          type: integer
        colorPrinting:
          type: boolean
        bindingType:
          type: string
        dueDate:
          type: string
          format: date
        pricePerUnit:
          type: number
          format: decimal
        bindingCost:
          type: number
          format: decimal
        totalPrice:
          type: number
          format: decimal
        status:
          type: string
          enum: [Received, In Progress, Quality Check, Ready, Delivered]
        statusHistory:
          type: array
          items:
            $ref: '#/components/schemas/StatusHistory'
        createdAt:
          type: string
          format: date-time

    # =====================================================
    # POS SCHEMAS
    # =====================================================
    CartItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        discountPercent:
          type: number
        subtotal:
          type: number
        total:
          type: number

    CartResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        subtotal:
          type: number
        taxAmount:
          type: number
        discountAmount:
          type: number
        totalAmount:
          type: number

    CheckoutRequest:
      type: object
      required:
        - paymentMethod
        - amountPaid
      properties:
        customerId:
          type: integer
          description: Optional for walk-in customers
        paymentMethod:
          type: string
          enum: [Cash, Credit, Bank Transfer, Telebirr]
        amountPaid:
          type: number
        paymentReference:
          type: string
          description: Required for Bank Transfer and Telebirr

    # =====================================================
    # INVENTORY SCHEMAS
    # =====================================================
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        category:
          type: string
        unit:
          type: string
        sellingPrice:
          type: number
        reorderLevel:
          type: integer
        expiryDate:
          type: string
          format: date
        isActive:
          type: boolean

    StockAdjustmentRequest:
      type: object
      required:
        - productId
        - quantityChange
        - reason
      properties:
        productId:
          type: integer
        quantityChange:
          type: integer
          description: Positive for increase, negative for decrease
        reason:
          type: string

    # =====================================================
    # CEO DASHBOARD SCHEMAS
    # =====================================================
    RevenueResponse:
      type: object
      properties:
        today:
          type: object
          properties:
            amount:
              type: number
            vsYesterday:
              type: number
              description: Percentage change
        week:
          type: object
          properties:
            amount:
              type: number
            trend:
              type: string
              enum: [up, down]
            percentage:
              type: number
        month:
          type: object
          properties:
            amount:
              type: number
            target:
              type: number
            progress:
              type: number
              description: Percentage of target achieved
        quarter:
          type: object
          properties:
            amount:
              type: number
            forecast:
              type: number

    ProfitResponse:
      type: object
      properties:
        total:
          type: number
        bySector:
          type: object
          properties:
            printing:
              type: number
            sales:
              type: number
            services:
              type: number
        margins:
          type: object
          properties:
            overall:
              type: number
            printing:
              type: number
            sales:
              type: number

    KPIResponse:
      type: object
      properties:
        salesTarget:
          type: object
          properties:
            actual:
              type: number
            target:
              type: number
            status:
              type: string
              enum: [green, yellow, red]
        fulfillmentTime:
          type: object
          properties:
            averageHours:
              type: number
            target:
              type: number
            status:
              type: string
        inventoryTurnover:
          type: object
          properties:
            ratio:
              type: number
            target:
              type: number
            status:
              type: string
        customerSatisfaction:
          type: object
          properties:
            score:
              type: number
            target:
              type: number
            status:
              type: string

    Alert:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        title:
          type: string
        message:
          type: string
        actionUrl:
          type: string
        createdAt:
          type: string
          format: date-time

  parameters:
    pageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Page number
    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100
      description: Items per page

paths:
  # =====================================================
  # AUTHENTICATION ENDPOINTS
  # =====================================================
  /auth/login:
    post:
      tags: [Authentication]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        401:
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        423:
          description: Account locked (too many attempts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: User logout
      security:
        - bearerAuth: []
      responses:
        200:
          description: Logout successful
        401:
          description: Unauthorized

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        200:
          description: New token generated
        401:
          description: Invalid refresh token

  /auth/change-password:
    post:
      tags: [Authentication]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        200:
          description: Password changed
        400:
          description: Invalid current password

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        200:
          description: Reset email sent

  # =====================================================
  # PRINTING ENDPOINTS
  # =====================================================
  /printing/orders:
    get:
      tags: [Printing]
      summary: List printing orders
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [Received, In Progress, Quality Check, Ready, Delivered]
        - name: search
          in: query
          schema:
            type: string
      responses:
        200:
          description: List of orders

    post:
      tags: [Printing]
      summary: Create printing order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrintingOrderRequest'
      responses:
        201:
          description: Order created
        400:
          description: Validation error

  /printing/orders/pending:
    get:
      tags: [Printing]
      summary: Get pending orders (dashboard widget)
      security:
        - bearerAuth: []
      responses:
        200:
          description: Pending orders list

  /printing/orders/{id}:
    get:
      tags: [Printing]
      summary: Get order details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Order details
        404:
          description: Order not found

  /printing/orders/{id}/status:
    put:
      tags: [Printing]
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [Received, In Progress, Quality Check, Ready, Delivered]
                reason:
                  type: string
      responses:
        200:
          description: Status updated
        400:
          description: Invalid status transition

  # =====================================================
  # POS ENDPOINTS
  # =====================================================
  /pos/products/search:
    get:
      tags: [POS]
      summary: Search products by name or barcode
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [name, barcode]
            default: name
      responses:
        200:
          description: Search results

  /pos/cart:
    get:
      tags: [POS]
      summary: Get current cart
      security:
        - bearerAuth: []
      responses:
        200:
          schema:
            $ref: '#/components/schemas/CartResponse'

    delete:
      tags: [POS]
      summary: Clear cart
      security:
        - bearerAuth: []
      responses:
        200:
          description: Cart cleared

  /pos/cart/items:
    post:
      tags: [POS]
      summary: Add item to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - quantity
              properties:
                productId:
                  type: integer
                quantity:
                  type: integer
                  minimum: 1
      responses:
        200:
          description: Item added

  /pos/cart/items/{itemId}:
    put:
      tags: [POS]
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        200:
          description: Item updated

    delete:
      tags: [POS]
      summary: Remove item from cart
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
      responses:
        200:
          description: Item removed

  /pos/cart/discount:
    put:
      tags: [POS]
      summary: Apply discount to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - value
              properties:
                type:
                  type: string
                  enum: [percentage, fixed]
                value:
                  type: number
                reason:
                  type: string
      responses:
        200:
          description: Discount applied

  /pos/checkout:
    post:
      tags: [POS]
      summary: Complete sale
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        200:
          description: Sale completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  saleId:
                    type: integer
                  invoiceNumber:
                    type: string
                  receipt:
                    type: object

  # =====================================================
  # INVENTORY ENDPOINTS
  # =====================================================
  /inventory/products:
    get:
      tags: [Inventory]
      summary: List products
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/limitParam'
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        200:
          description: Product list

    post:
      tags: [Inventory]
      summary: Create product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        201:
          description: Product created

  /inventory/products/low-stock:
    get:
      tags: [Inventory]
      summary: Get low stock products
      security:
        - bearerAuth: []
      responses:
        200:
          description: Low stock alerts

  /inventory/adjustments:
    post:
      tags: [Inventory]
      summary: Adjust stock quantity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockAdjustmentRequest'
      responses:
        200:
          description: Stock adjusted

  /inventory/movements:
    get:
      tags: [Inventory]
      summary: Get inventory movement history
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        200:
          description: Movement history

  # =====================================================
  # CEO DASHBOARD ENDPOINTS
  # =====================================================
  /ceo/dashboard:
    get:
      tags: [CEO Dashboard]
      summary: Get dashboard overview
      security:
        - bearerAuth: []
      responses:
        200:
          description: Dashboard metrics

  /ceo/revenue:
    get:
      tags: [CEO Dashboard]
      summary: Get revenue metrics
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, quarter]
            default: week
      responses:
        200:
          schema:
            $ref: '#/components/schemas/RevenueResponse'

  /ceo/profit:
    get:
      tags: [CEO Dashboard]
      summary: Get profit metrics
      security:
        - bearerAuth: []
      responses:
        200:
          schema:
            $ref: '#/components/schemas/ProfitResponse'

  /ceo/kpis:
    get:
      tags: [CEO Dashboard]
      summary: Get performance KPIs
      security:
        - bearerAuth: []
      responses:
        200:
          schema:
            $ref: '#/components/schemas/KPIResponse'

  /ceo/targets:
    get:
      tags: [CEO Dashboard]
      summary: Get target configuration
      security:
        - bearerAuth: []
      responses:
        200:
          description: Target settings

    put:
      tags: [CEO Dashboard]
      summary: Update targets
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dailySalesTarget:
                  type: number
                fulfillmentHoursTarget:
                  type: number
                turnoverTarget:
                  type: number
                satisfactionTarget:
                  type: number
      responses:
        200:
          description: Targets updated

  /ceo/alerts:
    get:
      tags: [CEO Dashboard]
      summary: Get critical alerts
      security:
        - bearerAuth: []
      responses:
        200:
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Alert'

  # =====================================================
  # HEALTH CHECK
  # =====================================================
  /health:
    get:
      tags: [System]
      summary: System health check
      responses:
        200:
          description: System healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                  database:
                    type: string
                    example: connected
                  redis:
                    type: string
                    example: connected

  # =====================================================
  # REPORTS
  # =====================================================
  /reports/sales/daily:
    get:
      tags: [Reports]
      summary: Daily sales report
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        200:
          description: Sales report

  /reports/finance/pnl:
    get:
      tags: [Reports]
      summary: Profit & Loss statement
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: sector
          in: query
          schema:
            type: string
      responses:
        200:
          description: P&L report

  /reports/export/{reportType}:
    get:
      tags: [Reports]
      summary: Export report
      security:
        - bearerAuth: []
      parameters:
        - name: reportType
          in: path
          required: true
          schema:
            type: string
            enum: [sales, inventory, pnl, balance_sheet, tax_audit]
        - name: format
          in: query
          schema:
            type: string
            enum: [pdf, excel, csv]
            default: pdf
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        200:
          description: Export file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string